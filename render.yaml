# ── Render Blueprint ─────────────────────────────────────────────────────────
# Deploy: connect GitHub repo in Render dashboard
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: nexus-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # Set manually in dashboard
      - key: ZOO_API_KEY
        sync: false  # Optional, set in dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexus-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: https://nexus-frontend.onrender.com

  # Frontend
  - type: web
    name: nexus-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: nexus-backend
          envVarKey: RENDER_EXTERNAL_URL

  # Redis for session persistence
  - type: redis
    name: nexus-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

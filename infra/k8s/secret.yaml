# !! DO NOT COMMIT REAL VALUES — use External Secrets Operator or Sealed Secrets
# in production to sync secrets from AWS Secrets Manager / GCP Secret Manager / Azure Key Vault.
#
# To generate base64:  echo -n 'your-value' | base64
#
# Install External Secrets Operator:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: nexus
  labels:
    app: nexus-platform
type: Opaque
data:
  # base64-encoded values — replace with real values via CI/CD or ESO
  OPENAI_API_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  LANGFUSE_PUBLIC_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  LANGFUSE_SECRET_KEY: "REPLACE_WITH_BASE64_ENCODED_VALUE"
  REDIS_PASSWORD: "REPLACE_WITH_BASE64_ENCODED_VALUE"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-backend
  namespace: nexus
  labels:
    app: nexus-backend
    component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0       # zero-downtime deploys
  selector:
    matchLabels:
      app: nexus-backend
  template:
    metadata:
      labels:
        app: nexus-backend
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: nexus-backend-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 30

      # Spread across AZs for fault tolerance
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: nexus-backend

      containers:
        - name: backend
          image: YOUR_REGISTRY/nexus-backend:latest  # e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com/nexus-backend:v1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8003
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: 8003
            failureThreshold: 30
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]  # drain connections before shutdown
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cad-output
              mountPath: /app/cad_output

      volumes:
        - name: cad-output
          persistentVolumeClaim:
            claimName: nexus-cad-pvc

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: nexus-backend
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-cad-pvc
  namespace: nexus
spec:
  accessModes:
    - ReadWriteMany          # RWX required for multi-replica access (use EFS/NFS/Azure Files)
  storageClassName: efs-sc   # change to gcp-filestore / azurefile-csi for other clouds
  resources:
    requests:
      storage: 50Gi

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexus-backend-sa
  namespace: nexus
  labels:
    app: nexus-backend
  annotations:
    # AWS IRSA — attach IAM role for S3/Secrets Manager access
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/nexus-backend-role"

---
# PodDisruptionBudget — ensure ≥2 replicas always running during node drains
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nexus-backend-pdb
  namespace: nexus
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: nexus-backend

apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-config
  namespace: nexus
  labels:
    app: nexus-platform
data:
  # Application
  APP_NAME: "nexus-platform"
  APP_VERSION: "1.0.0"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"

  # Service Discovery (in-cluster service names)
  REDIS_URL: "redis://nexus-redis:6379"
  CHROMA_HOST: "nexus-chromadb"
  CHROMA_PORT: "8000"

  # CORS — update with your actual domain
  CORS_ORIGINS: "https://nexus.yourdomain.com,https://www.nexus.yourdomain.com"

  # OpenTelemetry — points to Prometheus/Grafana stack
  OTLP_ENDPOINT: "http://prometheus-kube-prometheus-prometheus.monitoring:9090"

  # LLM defaults
  OPENAI_MODEL: "gpt-4o"
  OPENAI_FAST_MODEL: "gpt-4o-mini"
  OPENAI_MAX_TOKENS: "4096"
  OPENAI_TEMPERATURE: "0.1"

  # Frontend
  NEXT_PUBLIC_API_URL: "https://nexus.yourdomain.com/api"
  NEXT_PUBLIC_WS_URL: "wss://nexus.yourdomain.com"
